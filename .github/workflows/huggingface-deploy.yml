name: Build and Deploy to Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package*.json'
      - 'packages/**'
      - 'bin/**'
      - 'huggingface/**'
      - '.github/workflows/huggingface-deploy.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: hf-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-ghcr:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set GHCR image name
        run: echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push complete image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.GHCR_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image push summary
        run: echo "Pushed ${{ env.GHCR_IMAGE }}"

  deploy-to-hf:
    name: Deploy to Hugging Face Space
    needs: build-and-push-ghcr
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: vars.HF_USERNAME != '' && vars.HF_SPACE_NAME != ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync thin Dockerfile to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required for deployment."
            exit 1
          fi

          GHCR_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"

          WORKDIR=$(mktemp -d)
          git clone "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}" "$WORKDIR"

          find "$WORKDIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          cp huggingface/README.md "$WORKDIR/README.md"
          sed "s|__GHCR_IMAGE__|${GHCR_IMAGE}|g" huggingface/Dockerfile > "$WORKDIR/Dockerfile"

          cd "$WORKDIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          git commit -m "Deploy GHCR image ${GHCR_IMAGE} (${GITHUB_SHA::7})"
          git push origin main
